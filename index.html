<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Pool &amp; Gym Occupancy — Wanhua Sports Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=IBM+Plex+Mono:wght@400&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1612;
      --paper: #faf8f4;
      --muted: #6b645c;
      --rule: #d9d3c8;
      --blue: #2a588a;
      --terra: #b44a28;
      --error: #9a1c1c;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); }
    body {
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 3em 1.5em 4em;
      line-height: 1.45;
    }
    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 500;
      font-size: clamp(2rem, 4vw, 2.75rem);
      letter-spacing: -0.015em;
      margin: 0 0 0.2em;
      font-variation-settings: "opsz" 96;
    }
    #meta {
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0 0 2.5em;
    }
    #filter {
      display: flex;
      align-items: center;
      gap: 0.25em;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      padding: 0.6em 0;
      margin-bottom: 2em;
      font-size: 0.9rem;
    }
    #filter .label {
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-right: 0.75em;
    }
    #filter label {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0.45em 1em;
      border-radius: 999px;
      cursor: pointer;
      user-select: none;
      transition: background 140ms ease, color 140ms ease;
    }
    #filter label:hover { background: rgba(26, 22, 18, 0.06); }
    #filter label:has(input:checked) { background: var(--ink); color: var(--paper); }
    #filter label:has(input:focus-visible) {
      outline: 2px solid var(--blue);
      outline-offset: 3px;
    }
    #filter input {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .chart-section { margin-top: 2em; }
    .chart-section:first-of-type { margin-top: 0; }
    .chart-section h2 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 500;
      font-size: 1.25rem;
      letter-spacing: -0.01em;
      margin: 0 0 0.75em;
      color: var(--ink);
    }
    .chart { min-height: 420px; }
    .chart figure { margin: 0; }
    .chart svg { max-width: 100%; height: auto; }
    .chart-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 420px;
      padding: 1em 2em;
      text-align: center;
      color: var(--muted);
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      border: 1px dashed var(--rule);
      border-radius: 4px;
    }
    #legend {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5em;
      margin-top: 1em;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    #legend > span { display: inline-flex; align-items: center; gap: 0.5em; }
    #legend .swatch { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    #legend .swatch-line {
      height: 0;
      border-top: 1px dashed var(--muted);
      width: 14px;
      border-radius: 0;
    }
    #status {
      color: var(--error);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.85rem;
      margin-top: 1em;
    }
  </style>
</head>
<body>
  <h1>Pool &amp; Gym Occupancy by Hour of Day</h1>
  <div id="meta"></div>
  <div id="filter">
    <span class="label">Show</span>
    <label><input type="radio" name="days" value="all" checked> All days</label>
    <label><input type="radio" name="days" value="weekday"> Weekdays</label>
    <label><input type="radio" name="days" value="weekend"> Weekends</label>
  </div>
  <section class="chart-section">
    <h2>Pool occupancy</h2>
    <div id="pool-chart" class="chart"></div>
  </section>
  <section class="chart-section">
    <h2>Gym occupancy</h2>
    <div id="gym-chart" class="chart"></div>
  </section>
  <div id="legend" aria-hidden="true">
    <span><span class="swatch" style="background:var(--blue)"></span>Weekday</span>
    <span><span class="swatch" style="background:var(--terra)"></span>Weekend</span>
    <span><span class="swatch swatch-line"></span>Pool capacity (100)</span>
    <span><span class="swatch swatch-line"></span>Gym capacity (150)</span>
  </div>
  <div id="status"></div>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6/dist/plot.umd.min.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
